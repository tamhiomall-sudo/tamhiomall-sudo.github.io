<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Capture · Adriaan Bosch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#16191d; --card:#1C1F23; --line:#2f333a; --text:#f0ece4; --dim:#9a948a;
          --accent:#C8A15A; --good:#4ecb8d; --warn:#e6c05a; --bad:#e66a5a; }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); margin: 0; padding: 24px;
    font: 15px/1.5 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif; }
  a { color: var(--accent); text-decoration: none; } a:hover { text-decoration: underline; }
  .acctbar { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:16px; font-size:12.5px; color:var(--dim); }
  .acctbar .who { color:var(--text); } .acctbar .spacer { flex:1; }
  .syncstatus { font-size:11.5px; color:var(--dim); } .syncstatus.good { color:var(--good); } .syncstatus.bad { color:var(--bad); }
  .acctbar button, .btn { background:#262a2f; border:1px solid var(--line); color:var(--text); border-radius:8px; padding:6px 12px; font:12px inherit; cursor:pointer; }
  .acctbar button:hover, .btn:hover { border-color:var(--accent); color:var(--accent); }
  h1 { font-family:'Fraunces',Georgia,serif; font-weight:400; font-size:27px; margin:0 0 16px; letter-spacing:-0.01em; }
  .tabs { display:flex; gap:8px; margin-bottom:20px; }
  .tab { background:none; border:1px solid var(--line); color:var(--dim); border-radius:8px; padding:8px 16px; font:600 12px 'Inter'; text-transform:uppercase; letter-spacing:.08em; cursor:pointer; }
  .tab.active { color:var(--text); border-color:var(--accent); }
  .view { display:none; } .view.active { display:block; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start; }
  @media (max-width:900px){ .grid { grid-template-columns:1fr; } }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px 22px; }
  .panel h2 { font-size:14px; text-transform:uppercase; letter-spacing:.06em; color:var(--accent); margin:0 0 14px; display:flex; justify-content:space-between; align-items:center; }
  label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--dim); margin:14px 0 6px; }
  input, select, textarea { width:100%; padding:10px 12px; font:15px 'Inter',sans-serif; background:#141619; color:var(--text); border:1px solid var(--line); border-radius:8px; }
  input:focus, select:focus, textarea:focus { outline:none; border-color:var(--accent); }
  textarea { min-height:220px; resize:vertical; font-family:ui-monospace,Menlo,monospace; font-size:13.5px; line-height:1.55; }
  .row { display:flex; gap:12px; } .row > div { flex:1; }
  .hide { display:none !important; }
  button.primary { margin-top:18px; width:100%; padding:11px; cursor:pointer; font:600 12.5px 'Inter'; text-transform:uppercase; letter-spacing:.1em; background:var(--accent); color:#16110a; border:none; border-radius:8px; }
  button.primary:hover { filter:brightness(1.06); }
  .layerchip { font-size:11px; padding:3px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.06em; }
  .layerchip.local { background:rgba(154,148,138,.15); color:var(--dim); }
  .layerchip.shareable { background:rgba(78,203,141,.12); color:var(--good); }
  .warnline { margin-top:10px; font-size:12px; color:var(--warn); }
  /* property editor */
  .props { margin-top:6px; border:1px solid var(--line); border-radius:9px; padding:6px 12px 12px; }
  .props .caption { font-size:10.5px; text-transform:uppercase; letter-spacing:.1em; color:var(--dim); margin:10px 0 4px; }
  .prow { display:flex; align-items:center; gap:8px; margin-top:8px; }
  .prow .key { flex:0 0 118px; font-family:ui-monospace,Menlo,monospace; font-size:12.5px; color:var(--accent); }
  .prow input.key { flex:0 0 118px; padding:8px 10px; }
  .prow .val { flex:1; padding:8px 10px; }
  .prow .rm { flex:0 0 auto; background:none; border:none; color:var(--dim); cursor:pointer; font-size:15px; padding:0 4px; }
  .prow .rm:hover { color:var(--bad); }
  .prow .hint { flex:0 0 100%; font-size:10.5px; color:var(--dim); margin:2px 0 0 126px; }
  #addProp { margin-top:12px; font-size:11.5px; }
  .item { border:1px solid var(--line); border-radius:9px; padding:12px 14px; margin-bottom:10px; background:#212429; }
  .item .top { display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  .item .t { font-weight:500; }
  .item .meta { font-size:11.5px; color:var(--dim); margin-top:3px; }
  .item .acts { margin-top:9px; display:flex; gap:8px; flex-wrap:wrap; }
  .item .acts button { font-size:11.5px; padding:4px 10px; }
  .badge { font-size:10.5px; padding:2px 8px; border-radius:5px; background:#262a2f; color:var(--dim); text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; }
  .empty { color:var(--dim); font-size:13px; padding:14px 0; }
  .filter { margin-bottom:12px; }
  .cpdsummary { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
  .cpdstat { background:#212429; border:1px solid var(--line); border-radius:9px; padding:10px 16px; flex:1 1 100px; }
  .cpdstat .n { font-family:'Fraunces',Georgia,serif; font-size:24px; } .cpdstat .l { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; }
  .foot { color:var(--dim); font-size:11.5px; margin-top:22px; max-width:90ch; }
</style>
</head>
<body>

<div class="acctbar">
  <span class="who" id="whoami">&nbsp;</span>
  <span class="syncstatus" id="syncStatus">connecting...</span>
  <span class="spacer"></span>
  <a href="./">Your tools</a>
  <button id="signout">Sign out</button>
</div>

<h1>Capture</h1>

<div class="tabs">
  <button class="tab active" data-view="notes">Notes</button>
  <button class="tab" data-view="training">Training / CPD</button>
</div>

<!-- NOTES -->
<div class="view active" id="view-notes">
  <div class="grid">
    <div class="panel">
      <h2>New note</h2>
      <label for="dest">Where does this go?</label>
      <select id="dest">
        <optgroup label="Notes (local working notes)">
          <option value="learning-note">Learning note (course, CPD)</option>
          <option value="meeting-note">Meeting note</option>
          <option value="design-note">Design note</option>
          <option value="resource">Resource / link</option>
          <option value="note">Inbox (decide later)</option>
        </optgroup>
        <optgroup label="Wiki (new page)">
          <option value="plannetjie">Plannetjie (idea)</option>
          <option value="concept">Concept</option>
          <option value="standard">Standard</option>
          <option value="synthesis">Synthesis</option>
          <option value="person">Person</option>
          <option value="leadership">Leadership</option>
          <option value="tooling">Tooling</option>
        </optgroup>
        <optgroup label="Append to an existing file">
          <option value="decision">Decision (decisions.md)</option>
          <option value="definition">Definition (definitions.md)</option>
          <option value="prompt">Prompt (prompts.md)</option>
        </optgroup>
      </select>
      <div id="destInfo" style="margin-top:8px;"></div>

      <label for="title">title</label>
      <input id="title" autocomplete="off" placeholder="A short, clear title">

      <label style="margin-bottom:0;">Properties</label>
      <div class="props" id="propBox">
        <div class="caption">frontmatter</div>
        <div id="propList"></div>
        <button class="btn" id="addProp">+ Add property</button>
      </div>

      <div id="f-training" class="hide"><label for="trainingLink">Link to a training entry (optional)</label><select id="trainingLink"><option value="">None</option></select></div>

      <label for="body">Note (markdown)</label>
      <textarea id="body" placeholder="Type freely. Markdown works: use ## for sections (the title is the # heading)."></textarea>

      <button class="primary" id="saveNote">Save note</button>
      <input type="hidden" id="editId" value="">
    </div>

    <div class="panel">
      <h2>Saved notes <button class="btn" id="exportAll" style="font-size:11px;">Export all .md</button></h2>
      <input class="filter" id="noteFilter" placeholder="Filter by title or tag" autocomplete="off">
      <div id="noteList"></div>
    </div>
  </div>
</div>

<!-- TRAINING -->
<div class="view" id="view-training">
  <div class="grid">
    <div class="panel">
      <h2>Add training / CPD</h2>
      <label for="tCourse">Course / activity</label>
      <input id="tCourse" autocomplete="off">
      <div class="row">
        <div><label for="tProvider">Provider</label><input id="tProvider" autocomplete="off"></div>
        <div><label for="tDate">Date</label><input id="tDate" type="date"></div>
      </div>
      <div class="row">
        <div><label for="tHours">CPD hours</label><input id="tHours" type="number" step="0.5" inputmode="decimal"></div>
        <div><label for="tStatus">Status</label><select id="tStatus"><option>Planned</option><option>In progress</option><option>Completed</option></select></div>
      </div>
      <label for="tCategory">Category</label>
      <input id="tCategory" list="catlist" autocomplete="off" placeholder="e.g. formal, informal, conference, reading">
      <datalist id="catlist"><option>Formal</option><option>Informal</option><option>Conference</option><option>Reading</option><option>Webinar</option><option>Qualification</option></datalist>
      <label for="tNote">Note</label>
      <textarea id="tNote" style="min-height:90px;"></textarea>
      <button class="primary" id="saveTraining">Add entry</button>
      <input type="hidden" id="tEditId" value="">
    </div>

    <div class="panel">
      <h2>CPD log <button class="btn" id="exportCpd" style="font-size:11px;">Export log .md</button></h2>
      <div class="cpdsummary" id="cpdSummary"></div>
      <div id="trainingList"></div>
    </div>
  </div>
</div>

<datalist id="taglist"></datalist>
<p class="foot" id="foot"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
(function(){
  const C = window.TOOLS_CONFIG;
  const TOOL = 'capture';
  const sb = window.supabase.createClient(C.SUPABASE_URL, C.SUPABASE_ANON_KEY);
  const $ = (id) => document.getElementById(id);

  const CONTROLLED_TAGS = ['strategy','decision-making','compliance','governance','methodology','standard','risk','resilience','theory','core-reference','strategic-approaches','operational-requirements','design-process','operations','hvm','cpted','counter-terrorism','building-envelope','blast','fire','security-systems','screening','lighting','saudi-arabia','leadership','planning','tooling','ai'];

  // How each property is written into YAML.
  const PROP_DEFS = {
    subject: { kind:'text' },
    source:  { kind:'text' },
    project: { kind:'text' },
    form:    { kind:'enum', options:['framework','method','reference','domain'] },
    'source-status': { kind:'enum', options:['licensed','freely-published','public-domain','restricted-client'], hint:'restricted-client forces sensitivity to local' },
    standard: { kind:'text', hint:'designation code, e.g. ISO 22343' },
    number:   { kind:'text', hint:'the next D number in decisions.md' },
    status:   { kind:'enum', options:['adopted','superseded'] },
    tags:    { kind:'list',  hint:'comma separated' },
    sources: { kind:'listq', hint:'comma separated' },
    related: { kind:'links', hint:'page names or [[links]], comma separated, for Obsidian linking' },
  };
  // Mirrors the vault. mode 'page' writes a new .md; mode 'append' writes a snippet to paste in.
  const DESTS = {
    // Notes (local working notes)
    'learning-note': { label:'Learning note', mode:'page', folder:'Cowork/Notes/Learning', layer:'local', wiki:false, props:['subject','source','project','related','tags'] },
    'meeting-note':  { label:'Meeting note',  mode:'page', folder:'Cowork/Notes/Meetings', layer:'local', wiki:false, props:['subject','project','related','tags'] },
    'design-note':   { label:'Design note',   mode:'page', folder:'Cowork/Notes/Design Notes', layer:'local', wiki:false, props:['subject','project','related','tags'] },
    'resource':      { label:'Resource',      mode:'page', folder:'Cowork/Notes/Resources', layer:'local', wiki:false, props:['source','subject','project','related','tags'] },
    'note':          { label:'Inbox note',    mode:'page', folder:'Cowork/Notes/Inbox', layer:'local', wiki:false, props:['subject','project','related','tags'] },
    // Wiki (new page)
    'plannetjie':    { label:'Plannetjie', mode:'page', folder:'Cowork/Wiki/Plannetjies', layer:'shareable', wiki:true, props:['sources','tags'] },
    'concept':       { label:'Concept',    mode:'page', folder:'Cowork/Wiki/Concepts', layer:'shareable', wiki:true, props:['form','sources','tags'] },
    'standard':      { label:'Standard',   mode:'page', folder:'Cowork/Wiki/Standards', layer:'shareable', wiki:true, props:['source-status','standard','sources','tags'], seedTags:'standard' },
    'synthesis':     { label:'Synthesis',  mode:'page', folder:'Cowork/Wiki/Synthesis', layer:'shareable', wiki:true, props:['sources','tags'] },
    'person':        { label:'Person',     mode:'page', folder:'Cowork/Wiki/People', layer:'shareable', wiki:true, props:['sources','tags'] },
    'leadership':    { label:'Leadership', mode:'page', folder:'Cowork/Wiki/Leadership', layer:'shareable', wiki:true, props:['sources','tags'], seedTags:'leadership' },
    'tooling':       { label:'Tooling',    mode:'page', folder:'Cowork/Wiki/Tooling', layer:'shareable', wiki:true, props:['sources','tags'], seedTags:'tooling' },
    // Append to an existing single file
    'decision':      { label:'Decision',   mode:'append', file:'Cowork/decisions.md',   layer:'shareable', wiki:false, props:['number','status'] },
    'definition':    { label:'Definition', mode:'append', file:'Cowork/definitions.md', layer:'shareable', wiki:false, props:[] },
    'prompt':        { label:'Prompt',     mode:'append', file:'Cowork/prompts.md',     layer:'shareable', wiki:false, props:[] },
  };
  // Standards drawn from a restricted client source stay local (the documented exception).
  function layerFor(dest, props){
    if (dest === 'standard' && props && props['source-status'] === 'restricted-client') return 'local';
    return DESTS[dest].layer;
  }

  let state = { notes: [], training: [] };
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const today = () => new Date().toISOString().slice(0,10);
  function escapeHtml(s){ return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // ---------- persistence ----------
  let saveTimer = null;
  function setStatus(t, cls){ const e=$('syncStatus'); if(e){ e.textContent=t; e.className='syncstatus '+(cls||''); } }
  function save(){
    setStatus('saving...');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try {
        const { data:{ session } } = await sb.auth.getSession();
        if(!session){ location.replace('./'); return; }
        const { error } = await sb.from('app_data').upsert(
          { user_id: session.user.id, tool: TOOL, data: state }, { onConflict: 'user_id,tool' });
        if(error) throw error;
        setStatus('saved','good');
      } catch(e){ setStatus('not saved - will retry','bad'); clearTimeout(saveTimer); saveTimer=setTimeout(save,5000); }
    }, 600);
  }

  // ---------- property editor ----------
  function propRow(key, val, custom){
    const def = PROP_DEFS[key] || { kind:'text' };
    const row = document.createElement('div'); row.className = 'prow' + (custom?' custom':'');
    let keyHtml = custom
      ? '<input class="key" placeholder="property" value="'+escapeHtml(key)+'">'
      : '<span class="key">'+escapeHtml(key)+'</span>';
    let valHtml;
    if (def.kind === 'enum') {
      valHtml = '<select class="val" data-key="'+escapeHtml(key)+'">'+def.options.map(o=>'<option'+(o===val?' selected':'')+'>'+o+'</option>').join('')+'</select>';
    } else {
      valHtml = '<input class="val" data-key="'+escapeHtml(key)+'" value="'+escapeHtml(val||'')+'" autocomplete="off"'+(key==='tags'?' list="taglist"':'')+'>';
    }
    row.innerHTML = keyHtml + valHtml + (custom ? '<button class="rm" title="remove">&times;</button>' : '');
    if (def.hint) { const h=document.createElement('div'); h.className='hint'; h.textContent=def.hint; row.appendChild(h); }
    if (custom) row.querySelector('.rm').onclick = () => row.remove();
    return row;
  }
  function renderProps(dest, props){
    const box = $('propList'); box.innerHTML=''; props = props || {};
    const std = DESTS[dest].props;
    std.forEach(k => box.appendChild(propRow(k, props[k], false)));
    Object.keys(props).forEach(k => { if(!std.includes(k)) box.appendChild(propRow(k, props[k], true)); });
  }
  function readProps(){
    const out = {};
    document.querySelectorAll('#propList .prow').forEach(row => {
      const custom = row.classList.contains('custom');
      const key = custom ? (row.querySelector('.key').value.trim()) : row.querySelector('.key').textContent.trim();
      const val = row.querySelector('.val').value.trim();
      if (key && val) out[key] = val;
    });
    return out;
  }

  // ---------- markdown export ----------
  function slug(s){ return (s||'untitled').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60) || 'untitled'; }
  function q(s){ return '"' + String(s).replace(/"/g,'\\"') + '"'; }
  function emitProp(key, val){
    const def = PROP_DEFS[key];
    if (def && def.kind === 'list') {
      const arr = val.split(',').map(x=>x.trim()).filter(Boolean);
      return key + ': [' + arr.join(', ') + ']\n';
    }
    if (def && def.kind === 'listq') {
      const arr = val.split(',').map(x=>x.trim()).filter(Boolean);
      return key + ':\n' + arr.map(x=>'  - ' + q(x)).join('\n') + '\n';
    }
    if (def && def.kind === 'links') {
      const arr = val.split(',').map(x=>x.trim()).filter(Boolean).map(x => /^\[\[.*\]\]$/.test(x) ? x : '[['+x+']]');
      return key + ':\n' + arr.map(x=>'  - ' + q(x)).join('\n') + '\n';
    }
    if (def && def.kind === 'enum') return key + ': ' + val + '\n';
    // text or custom: quote; Obsidian reads a quoted [[link]] as a link too
    return key + ': ' + q(val) + '\n';
  }
  function buildMarkdown(n){
    const d = DESTS[n.dest];
    const props = n.props || {};

    // Append destinations are single files, so emit a snippet to paste in, not a page.
    if (d.mode === 'append') {
      const title = n.title || 'Untitled';
      if (n.dest === 'decision') {
        const num = props.number ? ('D' + String(props.number).replace(/^D/i,'')) : 'D[next]';
        return '## ' + num + ': ' + title + '\n' +
               '**Date:** ' + (n.created||today()) + ' · **Status:** ' + (props.status||'adopted') + '\n\n' +
               (n.body||'') + '\n';
      }
      return '## ' + title + '\n\n' + (n.body||'') + '\n';
    }

    let fm = '---\n';
    fm += 'title: ' + q(n.title||'') + '\n';
    fm += 'type: ' + n.dest + '\n';
    if (d.wiki) {
      fm += 'created: ' + (n.created||today()) + '\n';
      fm += 'updated: ' + today() + '\n';
      fm += 'author: adriaan\n';
      fm += 'sensitivity: ' + layerFor(n.dest, props) + '\n';
    } else {
      fm += 'date: ' + (n.created||today()) + '\n';
      fm += 'sensitivity: ' + layerFor(n.dest, props) + '\n';
    }
    // standard props first (in destination order), then any custom
    d.props.forEach(k => { if (props[k]) fm += emitProp(k, props[k]); });
    Object.keys(props).forEach(k => { if (!d.props.includes(k) && props[k]) fm += emitProp(k, props[k]); });
    fm += '---\n\n# ' + (n.title||'Untitled') + '\n\n' + (n.body||'') + '\n';
    return fm;
  }
  function download(filename, text){
    const blob = new Blob([text], { type:'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  }

  // ---------- notes ----------
  function refreshDestInfo(){
    const dest = $('dest').value, d = DESTS[dest];
    const layer = layerFor(dest, readProps());
    const where = d.mode === 'append'
      ? 'paste into ' + d.file
      : 'lands in ' + d.folder;
    $('destInfo').innerHTML = '<span class="layerchip '+layer+'">'+layer+'</span> <span style="color:var(--dim); font-size:12px;">'+where+'</span>' +
      (d.mode === 'append' ? '<div class="warnline">This is a single file, so Export gives you a snippet to paste in, not a new page.</div>' : '') +
      (layer==='shareable' ? '<div class="warnline">Shareable: check it names no client or site before it leaves the local layer.</div>' : '');
    $('f-training').classList.toggle('hide', d.wiki || d.mode === 'append');
  }
  function onDestChange(){
    // Carry over what still applies: the new type's own properties, plus any
    // custom ones the user added. Drop properties that belonged to the old type.
    const cur = readProps();
    const dest = $('dest').value, d = DESTS[dest];
    const kept = {};
    Object.keys(cur).forEach(k => {
      if (d.props.includes(k)) kept[k] = cur[k];      // still relevant
      else if (!PROP_DEFS[k]) kept[k] = cur[k];       // the user's own custom property
    });
    if (d.seedTags && !kept.tags) kept.tags = d.seedTags;
    renderProps(dest, kept);
    refreshDestInfo();
  }
  function clearNoteForm(){ $('title').value=''; $('body').value=''; $('editId').value=''; $('saveNote').textContent='Save note'; renderProps($('dest').value, {}); }
  function saveNote(){
    const dest = $('dest').value, title = $('title').value.trim();
    if(!title){ alert('Give the note a title.'); return; }
    const props = readProps();
    const rec = { dest, title, props, trainingId: $('trainingLink').value, body: $('body').value, sensitivity: layerFor(dest, props) };
    const editId = $('editId').value;
    if(editId){ const n=state.notes.find(x=>x.id===editId); Object.assign(n, rec, { updated: today() }); }
    else state.notes.unshift(Object.assign({ id: uid(), created: today(), updated: today() }, rec));
    save(); renderNotes(); clearNoteForm();
  }
  function editNote(id){
    const n = state.notes.find(x=>x.id===id); if(!n) return;
    $('dest').value=n.dest; refreshDestInfo(); renderProps(n.dest, n.props||{});
    $('title').value=n.title||''; $('trainingLink').value=n.trainingId||''; $('body').value=n.body||'';
    $('editId').value=id; $('saveNote').textContent='Update note';
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function delNote(id){ if(!confirm('Delete this note?')) return; state.notes=state.notes.filter(x=>x.id!==id); save(); renderNotes(); }
  function renderNotes(){
    const query = $('noteFilter').value.toLowerCase();
    const list = $('noteList'); list.innerHTML='';
    const notes = state.notes.filter(n => !query || (n.title+' '+Object.values(n.props||{}).join(' ')).toLowerCase().includes(query));
    if(!notes.length){ list.innerHTML='<div class="empty">No notes yet. Write one on the left.</div>'; return; }
    notes.forEach(n=>{
      const d = DESTS[n.dest];
      const el = document.createElement('div'); el.className='item';
      const subj = (n.props && (n.props.subject||n.props.source)) || '';
      const lay = layerFor(n.dest, n.props);
      el.innerHTML = '<div class="top"><span class="t">'+escapeHtml(n.title||'Untitled')+'</span><span class="badge">'+d.label+'</span></div>'+
        '<div class="meta">'+n.created+(subj?' · '+escapeHtml(subj):'')+' · <span class="layerchip '+lay+'">'+lay+'</span></div>'+
        '<div class="acts"><button class="btn" data-ed="'+n.id+'">Edit</button><button class="btn" data-ex="'+n.id+'">Export .md</button><button class="btn" data-del="'+n.id+'">Delete</button></div>';
      list.appendChild(el);
    });
    list.querySelectorAll('[data-ed]').forEach(b=>b.onclick=()=>editNote(b.dataset.ed));
    list.querySelectorAll('[data-ex]').forEach(b=>b.onclick=()=>{ const n=state.notes.find(x=>x.id===b.dataset.ex); download(slug(n.title)+(DESTS[n.dest].mode==='append'?'-snippet':'')+'.md', buildMarkdown(n)); });
    list.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>delNote(b.dataset.del));
  }
  function exportAll(){
    if(!state.notes.length){ alert('No notes to export.'); return; }
    state.notes.forEach((n,i)=> setTimeout(()=>download(slug(n.title)+(DESTS[n.dest].mode==='append'?'-snippet':'')+'.md', buildMarkdown(n)), i*350));
  }

  // ---------- training ----------
  function readTraining(){
    return { course:$('tCourse').value.trim(), provider:$('tProvider').value.trim(), date:$('tDate').value,
      hours:parseFloat($('tHours').value)||0, status:$('tStatus').value, category:$('tCategory').value.trim(), note:$('tNote').value.trim() };
  }
  function clearTraining(){ ['tCourse','tProvider','tDate','tHours','tCategory','tNote'].forEach(id=>$(id).value=''); $('tStatus').value='Planned'; $('tEditId').value=''; $('saveTraining').textContent='Add entry'; }
  function saveTraining(){
    const t=readTraining(); if(!t.course){ alert('Name the course or activity.'); return; }
    const id=$('tEditId').value;
    if(id){ const e=state.training.find(x=>x.id===id); Object.assign(e,t); }
    else state.training.unshift(Object.assign({id:uid()},t));
    save(); renderTraining(); populateTrainingLink(); clearTraining();
  }
  function editTraining(id){ const t=state.training.find(x=>x.id===id); if(!t)return;
    $('tCourse').value=t.course; $('tProvider').value=t.provider||''; $('tDate').value=t.date||'';
    $('tHours').value=t.hours||''; $('tStatus').value=t.status||'Planned'; $('tCategory').value=t.category||''; $('tNote').value=t.note||'';
    $('tEditId').value=id; $('saveTraining').textContent='Update entry'; window.scrollTo({top:0,behavior:'smooth'}); }
  function delTraining(id){ if(!confirm('Delete this entry?'))return; state.training=state.training.filter(x=>x.id!==id); save(); renderTraining(); populateTrainingLink(); }
  function renderTraining(){
    const yr=new Date().getFullYear();
    const done=state.training.filter(t=>t.status==='Completed');
    const totalH=state.training.reduce((s,t)=>s+(t.hours||0),0);
    const yrH=state.training.filter(t=>(t.date||'').startsWith(yr)).reduce((s,t)=>s+(t.hours||0),0);
    $('cpdSummary').innerHTML =
      '<div class="cpdstat"><div class="n">'+(Math.round(yrH*10)/10)+'</div><div class="l">Hours '+yr+'</div></div>'+
      '<div class="cpdstat"><div class="n">'+(Math.round(totalH*10)/10)+'</div><div class="l">Hours total</div></div>'+
      '<div class="cpdstat"><div class="n">'+done.length+'</div><div class="l">Completed</div></div>';
    const list=$('trainingList'); list.innerHTML='';
    if(!state.training.length){ list.innerHTML='<div class="empty">No training logged yet.</div>'; return; }
    state.training.forEach(t=>{
      const el=document.createElement('div'); el.className='item';
      el.innerHTML='<div class="top"><span class="t">'+escapeHtml(t.course)+'</span><span class="badge">'+escapeHtml(t.status||'')+'</span></div>'+
        '<div class="meta">'+[t.provider,t.date,(t.hours?t.hours+' h':''),t.category].filter(Boolean).map(escapeHtml).join(' · ')+'</div>'+
        '<div class="acts"><button class="btn" data-ted="'+t.id+'">Edit</button><button class="btn" data-tdel="'+t.id+'">Delete</button></div>';
      list.appendChild(el);
    });
    list.querySelectorAll('[data-ted]').forEach(b=>b.onclick=()=>editTraining(b.dataset.ted));
    list.querySelectorAll('[data-tdel]').forEach(b=>b.onclick=()=>delTraining(b.dataset.tdel));
  }
  function populateTrainingLink(){
    const sel=$('trainingLink'); const cur=sel.value;
    sel.innerHTML='<option value="">None</option>'+state.training.map(t=>'<option value="'+t.id+'">'+escapeHtml(t.course)+'</option>').join('');
    sel.value=cur;
  }
  function exportCpd(){
    const totalH=state.training.reduce((s,t)=>s+(t.hours||0),0);
    let md='---\ntitle: "CPD Log"\ntype: note\ndate: '+today()+'\nsensitivity: local\ntags: [cpd, leadership]\n---\n\n# CPD Log\n\nTotal recorded: '+(Math.round(totalH*10)/10)+' hours.\n\n| Date | Course | Provider | Hours | Category | Status |\n|------|--------|----------|-------|----------|--------|\n';
    state.training.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach(t=>{
      md+='| '+[t.date||'',t.course||'',t.provider||'',(t.hours||''),t.category||'',t.status||''].map(x=>String(x).replace(/\|/g,'/')).join(' | ')+' |\n';
    });
    download('cpd-log.md', md);
  }

  // ---------- boot ----------
  $('taglist').innerHTML = CONTROLLED_TAGS.map(t=>'<option value="'+t+'">').join('');
  $('foot').textContent = 'Notes save to your account and sync across devices. The Properties block becomes the frontmatter: fill the standard fields or add your own with + Add property. Export writes an Obsidian-ready .md that drops into the destination folder, links and all. Working notes stay local; Plannetjies and Concepts are shareable, and only after you have checked them for client detail.';

  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); $('view-'+t.dataset.view).classList.add('active');
  });
  $('dest').addEventListener('change', onDestChange);
  $('addProp').addEventListener('click', () => $('propList').appendChild(propRow('', '', true)));
  // source-status can flip a Standard to local, so keep the layer chip live
  $('propList').addEventListener('change', refreshDestInfo);
  $('saveNote').addEventListener('click', saveNote);
  $('noteFilter').addEventListener('input', renderNotes);
  $('exportAll').addEventListener('click', exportAll);
  $('saveTraining').addEventListener('click', saveTraining);
  $('exportCpd').addEventListener('click', exportCpd);

  sb.auth.onAuthStateChange((_e, sess)=>{ if(!sess) location.replace('./'); });
  $('signout').addEventListener('click', async ()=>{ await sb.auth.signOut(); location.replace('./'); });

  (async function boot(){
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ location.replace('./'); return; }
    $('whoami').textContent = session.user.email;
    try {
      const { data, error } = await sb.from('app_data').select('data').eq('tool', TOOL).maybeSingle();
      if(error) throw error;
      if(data && data.data){ state = Object.assign({ notes:[], training:[] }, data.data); }
      setStatus('saved','good');
    } catch(e){ setStatus('offline - not loaded','bad'); }
    refreshDestInfo(); renderProps($('dest').value, {}); renderNotes(); renderTraining(); populateTrainingLink();
  })();
})();
</script>

</body>
</html>
