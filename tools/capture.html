<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Capture · Adriaan Bosch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0e1117; --card:#181c24; --line:#2a2e36; --text:#f0ece4; --dim:#9a948a;
          --accent:#d98e4a; --good:#4ecb8d; --warn:#e6c05a; --bad:#e66a5a; }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); margin: 0; padding: 24px;
    font: 15px/1.5 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif; }
  a { color: var(--accent); text-decoration: none; } a:hover { text-decoration: underline; }
  .acctbar { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:16px; font-size:12.5px; color:var(--dim); }
  .acctbar .who { color:var(--text); } .acctbar .spacer { flex:1; }
  .syncstatus { font-size:11.5px; color:var(--dim); } .syncstatus.good { color:var(--good); } .syncstatus.bad { color:var(--bad); }
  .acctbar button, .btn { background:#22262e; border:1px solid var(--line); color:var(--text); border-radius:8px; padding:6px 12px; font:12px inherit; cursor:pointer; }
  .acctbar button:hover, .btn:hover { border-color:var(--accent); color:var(--accent); }
  h1 { font-family:'Fraunces',Georgia,serif; font-weight:400; font-size:27px; margin:0 0 16px; letter-spacing:-0.01em; }
  .tabs { display:flex; gap:8px; margin-bottom:20px; }
  .tab { background:none; border:1px solid var(--line); color:var(--dim); border-radius:8px; padding:8px 16px; font:600 12px 'Inter'; text-transform:uppercase; letter-spacing:.08em; cursor:pointer; }
  .tab.active { color:var(--text); border-color:var(--accent); }
  .view { display:none; } .view.active { display:block; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start; }
  @media (max-width:900px){ .grid { grid-template-columns:1fr; } }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px 22px; }
  .panel h2 { font-size:14px; text-transform:uppercase; letter-spacing:.06em; color:var(--accent); margin:0 0 14px; display:flex; justify-content:space-between; align-items:center; }
  label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--dim); margin:14px 0 6px; }
  input, select, textarea { width:100%; padding:10px 12px; font:15px 'Inter',sans-serif; background:#0f131a; color:var(--text); border:1px solid var(--line); border-radius:8px; }
  input:focus, select:focus, textarea:focus { outline:none; border-color:var(--accent); }
  textarea { min-height:220px; resize:vertical; font-family:ui-monospace,Menlo,monospace; font-size:13.5px; line-height:1.55; }
  .row { display:flex; gap:12px; } .row > div { flex:1; }
  .hide { display:none !important; }
  button.primary { margin-top:18px; width:100%; padding:11px; cursor:pointer; font:600 12.5px 'Inter'; text-transform:uppercase; letter-spacing:.1em; background:var(--accent); color:#16110a; border:none; border-radius:8px; }
  button.primary:hover { filter:brightness(1.06); }
  .layerchip { font-size:11px; padding:3px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.06em; }
  .layerchip.local { background:rgba(154,148,138,.15); color:var(--dim); }
  .layerchip.shareable { background:rgba(78,203,141,.12); color:var(--good); }
  .warnline { margin-top:10px; font-size:12px; color:var(--warn); }
  .item { border:1px solid var(--line); border-radius:9px; padding:12px 14px; margin-bottom:10px; background:#1b202a; }
  .item .top { display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  .item .t { font-weight:500; }
  .item .meta { font-size:11.5px; color:var(--dim); margin-top:3px; }
  .item .acts { margin-top:9px; display:flex; gap:8px; flex-wrap:wrap; }
  .item .acts button { font-size:11.5px; padding:4px 10px; }
  .badge { font-size:10.5px; padding:2px 8px; border-radius:5px; background:#22262e; color:var(--dim); text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; }
  .empty { color:var(--dim); font-size:13px; padding:14px 0; }
  .filter { margin-bottom:12px; }
  .cpdsummary { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
  .cpdstat { background:#1b202a; border:1px solid var(--line); border-radius:9px; padding:10px 16px; flex:1 1 100px; }
  .cpdstat .n { font-family:'Fraunces',Georgia,serif; font-size:24px; } .cpdstat .l { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; }
  .foot { color:var(--dim); font-size:11.5px; margin-top:22px; }
</style>
</head>
<body>

<div class="acctbar">
  <span class="who" id="whoami">&nbsp;</span>
  <span class="syncstatus" id="syncStatus">connecting...</span>
  <span class="spacer"></span>
  <a href="./">Your tools</a>
  <button id="signout">Sign out</button>
</div>

<h1>Capture</h1>

<div class="tabs">
  <button class="tab active" data-view="notes">Notes</button>
  <button class="tab" data-view="training">Training / CPD</button>
</div>

<!-- NOTES -->
<div class="view active" id="view-notes">
  <div class="grid">
    <div class="panel">
      <h2>New note</h2>
      <label for="dest">Where does this go?</label>
      <select id="dest">
        <option value="learning-note">Learning note (course, CPD)</option>
        <option value="meeting-note">Meeting note</option>
        <option value="plannetjie">Idea (Plannetjie)</option>
        <option value="concept">Concept (wiki page)</option>
        <option value="resource">Resource / link</option>
        <option value="note">Inbox (decide later)</option>
      </select>
      <div id="destInfo" style="margin-top:8px;"></div>

      <label for="title">Title</label>
      <input id="title" autocomplete="off" placeholder="A short, clear title">

      <div id="f-form" class="hide">
        <label for="form">Form</label>
        <select id="form"><option value="framework">framework</option><option value="method">method</option><option value="reference">reference</option><option value="domain">domain</option></select>
      </div>
      <div id="f-subject"><label for="subject">Subject / topic</label><input id="subject" autocomplete="off"></div>
      <div id="f-source"><label for="source">Source (course, book, link)</label><input id="source" autocomplete="off"></div>
      <div id="f-project" class="hide"><label for="project">Project code (optional)</label><input id="project" autocomplete="off"></div>
      <div id="f-training" class="hide"><label for="trainingLink">Link to a training entry (optional)</label><select id="trainingLink"><option value="">None</option></select></div>

      <label for="tags">Tags (comma separated)</label>
      <input id="tags" list="taglist" autocomplete="off">
      <datalist id="taglist"></datalist>

      <label for="body">Note (markdown)</label>
      <textarea id="body" placeholder="Type freely. Markdown works: # headings, - bullets, **bold**."></textarea>

      <button class="primary" id="saveNote">Save note</button>
      <input type="hidden" id="editId" value="">
    </div>

    <div class="panel">
      <h2>Saved notes <button class="btn" id="exportAll" style="font-size:11px;">Export all .md</button></h2>
      <input class="filter" id="noteFilter" placeholder="Filter by title, subject or tag" autocomplete="off">
      <div id="noteList"></div>
    </div>
  </div>
</div>

<!-- TRAINING -->
<div class="view" id="view-training">
  <div class="grid">
    <div class="panel">
      <h2>Add training / CPD</h2>
      <label for="tCourse">Course / activity</label>
      <input id="tCourse" autocomplete="off">
      <div class="row">
        <div><label for="tProvider">Provider</label><input id="tProvider" autocomplete="off"></div>
        <div><label for="tDate">Date</label><input id="tDate" type="date"></div>
      </div>
      <div class="row">
        <div><label for="tHours">CPD hours</label><input id="tHours" type="number" step="0.5" inputmode="decimal"></div>
        <div><label for="tStatus">Status</label><select id="tStatus"><option>Planned</option><option>In progress</option><option>Completed</option></select></div>
      </div>
      <label for="tCategory">Category</label>
      <input id="tCategory" list="catlist" autocomplete="off" placeholder="e.g. formal, informal, conference, reading">
      <datalist id="catlist"><option>Formal</option><option>Informal</option><option>Conference</option><option>Reading</option><option>Webinar</option><option>Qualification</option></datalist>
      <label for="tNote">Note</label>
      <textarea id="tNote" style="min-height:90px;"></textarea>
      <button class="primary" id="saveTraining">Add entry</button>
      <input type="hidden" id="tEditId" value="">
    </div>

    <div class="panel">
      <h2>CPD log <button class="btn" id="exportCpd" style="font-size:11px;">Export log .md</button></h2>
      <div class="cpdsummary" id="cpdSummary"></div>
      <div id="trainingList"></div>
    </div>
  </div>
</div>

<p class="foot" id="foot"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
(function(){
  const C = window.TOOLS_CONFIG;
  const TOOL = 'capture';
  const sb = window.supabase.createClient(C.SUPABASE_URL, C.SUPABASE_ANON_KEY);
  const $ = (id) => document.getElementById(id);

  const CONTROLLED_TAGS = ['strategy','decision-making','compliance','governance','methodology','standard','risk','resilience','theory','core-reference','strategic-approaches','operational-requirements','design-process','operations','hvm','cpted','counter-terrorism','building-envelope','blast','fire','security-systems','screening','lighting','saudi-arabia','leadership','planning','tooling','ai'];

  // dest -> how it exports
  const DESTS = {
    'learning-note': { label:'Learning note', folder:'Cowork/Notes/Learning', layer:'local', wiki:false, fields:['subject','source'] },
    'meeting-note':  { label:'Meeting note',  folder:'Cowork/Notes/Meetings', layer:'local', wiki:false, fields:['subject','project'] },
    'plannetjie':    { label:'Plannetjie',    folder:'Cowork/Wiki/Plannetjies', layer:'shareable', wiki:true, fields:['source'] },
    'concept':       { label:'Concept',       folder:'Cowork/Wiki/Concepts', layer:'shareable', wiki:true, fields:['form','source'] },
    'resource':      { label:'Resource',      folder:'Cowork/Notes/Resources', layer:'local', wiki:false, fields:['source','subject'] },
    'note':          { label:'Inbox note',    folder:'Cowork/Notes/Inbox', layer:'local', wiki:false, fields:[] },
  };

  let state = { notes: [], training: [] };
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const today = () => new Date().toISOString().slice(0,10);

  // ---------- persistence ----------
  let saveTimer = null;
  function setStatus(t, cls){ const e=$('syncStatus'); if(e){ e.textContent=t; e.className='syncstatus '+(cls||''); } }
  function save(){
    setStatus('saving...');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try {
        const { data:{ session } } = await sb.auth.getSession();
        if(!session){ location.replace('./'); return; }
        const { error } = await sb.from('app_data').upsert(
          { user_id: session.user.id, tool: TOOL, data: state }, { onConflict: 'user_id,tool' });
        if(error) throw error;
        setStatus('saved','good');
      } catch(e){ setStatus('not saved - will retry','bad'); clearTimeout(saveTimer); saveTimer=setTimeout(save,5000); }
    }, 600);
  }

  // ---------- markdown export ----------
  function slug(s){ return (s||'untitled').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60) || 'untitled'; }
  function yamlList(arr){ return '[' + arr.join(', ') + ']'; }
  function buildMarkdown(n){
    const d = DESTS[n.dest];
    const tags = (n.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
    let fm = '---\n';
    fm += 'title: "' + (n.title||'').replace(/"/g,'\\"') + '"\n';
    fm += 'type: ' + n.dest + '\n';
    if (n.dest === 'concept') fm += 'form: ' + (n.form||'reference') + '\n';
    if (d.wiki){
      fm += 'created: ' + (n.created||today()) + '\n';
      fm += 'updated: ' + today() + '\n';
      fm += 'author: adriaan\n';
      fm += 'sensitivity: ' + (n.sensitivity||d.layer) + '\n';
      fm += 'sources:' + (n.source ? '\n  - "' + n.source.replace(/"/g,'\\"') + '"\n' : ' []\n');
    } else {
      fm += 'date: ' + (n.created||today()) + '\n';
      fm += 'project: "' + (n.project||'') + '"\n';
      fm += 'related: []\n';
      fm += 'subject: "' + (n.subject||'') + '"\n';
      if (d.fields.includes('source')) fm += 'source: "' + (n.source||'') + '"\n';
      fm += 'sensitivity: ' + (n.sensitivity||d.layer) + '\n';
    }
    fm += 'tags: ' + yamlList(tags) + '\n';
    fm += '---\n\n# ' + (n.title||'Untitled') + '\n\n' + (n.body||'') + '\n';
    return fm;
  }
  function download(filename, text){
    const blob = new Blob([text], { type:'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  }

  // ---------- notes UI ----------
  function refreshDestInfo(){
    const d = DESTS[$('dest').value];
    $('destInfo').innerHTML = '<span class="layerchip '+d.layer+'">'+d.layer+'</span> <span style="color:var(--dim); font-size:12px;">lands in '+d.folder+'</span>' +
      (d.layer==='shareable' ? '<div class="warnline">Shareable: make sure it names no client or site before it leaves the local layer.</div>' : '');
    ['form','subject','source','project'].forEach(f => {
      const wrap = $('f-'+f); if(!wrap) return;
      wrap.classList.toggle('hide', !d.fields.includes(f));
    });
    $('f-training').classList.toggle('hide', d.wiki); // link-to-training only for working notes
  }
  function readNoteForm(){
    return {
      dest: $('dest').value, title: $('title').value.trim(), form: $('form').value,
      subject: $('subject').value.trim(), source: $('source').value.trim(),
      project: $('project').value.trim(), trainingId: $('trainingLink').value,
      tags: $('tags').value.trim(), body: $('body').value,
      sensitivity: DESTS[$('dest').value].layer,
    };
  }
  function clearNoteForm(){ ['title','subject','source','project','tags','body'].forEach(id=>$(id).value=''); $('editId').value=''; $('saveNote').textContent='Save note'; }
  function saveNote(){
    const f = readNoteForm();
    if(!f.title){ alert('Give the note a title.'); return; }
    const editId = $('editId').value;
    if(editId){
      const n = state.notes.find(x=>x.id===editId); Object.assign(n, f, { updated: today() });
    } else {
      state.notes.unshift(Object.assign({ id: uid(), created: today(), updated: today() }, f));
    }
    save(); renderNotes(); clearNoteForm();
  }
  function editNote(id){
    const n = state.notes.find(x=>x.id===id); if(!n) return;
    $('dest').value=n.dest; refreshDestInfo();
    $('title').value=n.title||''; $('form').value=n.form||'reference';
    $('subject').value=n.subject||''; $('source').value=n.source||''; $('project').value=n.project||'';
    $('trainingLink').value=n.trainingId||''; $('tags').value=n.tags||''; $('body').value=n.body||'';
    $('editId').value=id; $('saveNote').textContent='Update note';
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function delNote(id){ if(!confirm('Delete this note?')) return; state.notes=state.notes.filter(x=>x.id!==id); save(); renderNotes(); }
  function renderNotes(){
    const q = $('noteFilter').value.toLowerCase();
    const list = $('noteList'); list.innerHTML='';
    const notes = state.notes.filter(n => !q || (n.title+' '+(n.subject||'')+' '+(n.tags||'')).toLowerCase().includes(q));
    if(!notes.length){ list.innerHTML='<div class="empty">No notes yet. Write one on the left.</div>'; return; }
    notes.forEach(n=>{
      const d = DESTS[n.dest];
      const el = document.createElement('div'); el.className='item';
      el.innerHTML = '<div class="top"><span class="t">'+escapeHtml(n.title||'Untitled')+'</span><span class="badge">'+d.label+'</span></div>'+
        '<div class="meta">'+n.created+(n.subject?' · '+escapeHtml(n.subject):'')+' · <span class="layerchip '+d.layer+'">'+d.layer+'</span></div>'+
        '<div class="acts"><button class="btn" data-ed="'+n.id+'">Edit</button><button class="btn" data-ex="'+n.id+'">Export .md</button><button class="btn" data-del="'+n.id+'">Delete</button></div>';
      list.appendChild(el);
    });
    list.querySelectorAll('[data-ed]').forEach(b=>b.onclick=()=>editNote(b.dataset.ed));
    list.querySelectorAll('[data-ex]').forEach(b=>b.onclick=()=>{ const n=state.notes.find(x=>x.id===b.dataset.ex); download(slug(n.title)+'.md', buildMarkdown(n)); });
    list.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>delNote(b.dataset.del));
  }
  function exportAll(){
    if(!state.notes.length){ alert('No notes to export.'); return; }
    state.notes.forEach((n,i)=> setTimeout(()=>download(slug(n.title)+'.md', buildMarkdown(n)), i*350));
  }

  // ---------- training UI ----------
  function readTraining(){
    return { course:$('tCourse').value.trim(), provider:$('tProvider').value.trim(), date:$('tDate').value,
      hours:parseFloat($('tHours').value)||0, status:$('tStatus').value, category:$('tCategory').value.trim(), note:$('tNote').value.trim() };
  }
  function clearTraining(){ ['tCourse','tProvider','tDate','tHours','tCategory','tNote'].forEach(id=>$(id).value=''); $('tStatus').value='Planned'; $('tEditId').value=''; $('saveTraining').textContent='Add entry'; }
  function saveTraining(){
    const t=readTraining(); if(!t.course){ alert('Name the course or activity.'); return; }
    const id=$('tEditId').value;
    if(id){ const e=state.training.find(x=>x.id===id); Object.assign(e,t); }
    else state.training.unshift(Object.assign({id:uid()},t));
    save(); renderTraining(); populateTrainingLink(); clearTraining();
  }
  function editTraining(id){ const t=state.training.find(x=>x.id===id); if(!t)return;
    $('tCourse').value=t.course; $('tProvider').value=t.provider||''; $('tDate').value=t.date||'';
    $('tHours').value=t.hours||''; $('tStatus').value=t.status||'Planned'; $('tCategory').value=t.category||''; $('tNote').value=t.note||'';
    $('tEditId').value=id; $('saveTraining').textContent='Update entry'; window.scrollTo({top:0,behavior:'smooth'}); }
  function delTraining(id){ if(!confirm('Delete this entry?'))return; state.training=state.training.filter(x=>x.id!==id); save(); renderTraining(); populateTrainingLink(); }
  function renderTraining(){
    const yr=new Date().getFullYear();
    const done=state.training.filter(t=>t.status==='Completed');
    const totalH=state.training.reduce((s,t)=>s+(t.hours||0),0);
    const yrH=state.training.filter(t=>(t.date||'').startsWith(yr)).reduce((s,t)=>s+(t.hours||0),0);
    $('cpdSummary').innerHTML =
      '<div class="cpdstat"><div class="n">'+(Math.round(yrH*10)/10)+'</div><div class="l">Hours '+yr+'</div></div>'+
      '<div class="cpdstat"><div class="n">'+(Math.round(totalH*10)/10)+'</div><div class="l">Hours total</div></div>'+
      '<div class="cpdstat"><div class="n">'+done.length+'</div><div class="l">Completed</div></div>';
    const list=$('trainingList'); list.innerHTML='';
    if(!state.training.length){ list.innerHTML='<div class="empty">No training logged yet.</div>'; return; }
    state.training.forEach(t=>{
      const el=document.createElement('div'); el.className='item';
      el.innerHTML='<div class="top"><span class="t">'+escapeHtml(t.course)+'</span><span class="badge">'+escapeHtml(t.status||'')+'</span></div>'+
        '<div class="meta">'+[t.provider,t.date,(t.hours?t.hours+' h':''),t.category].filter(Boolean).map(escapeHtml).join(' · ')+'</div>'+
        '<div class="acts"><button class="btn" data-ted="'+t.id+'">Edit</button><button class="btn" data-tdel="'+t.id+'">Delete</button></div>';
      list.appendChild(el);
    });
    list.querySelectorAll('[data-ted]').forEach(b=>b.onclick=()=>editTraining(b.dataset.ted));
    list.querySelectorAll('[data-tdel]').forEach(b=>b.onclick=()=>delTraining(b.dataset.tdel));
  }
  function populateTrainingLink(){
    const sel=$('trainingLink'); const cur=sel.value;
    sel.innerHTML='<option value="">None</option>'+state.training.map(t=>'<option value="'+t.id+'">'+escapeHtml(t.course)+'</option>').join('');
    sel.value=cur;
  }
  function exportCpd(){
    const yr=new Date().getFullYear();
    const totalH=state.training.reduce((s,t)=>s+(t.hours||0),0);
    let md='---\ntitle: "CPD Log"\ntype: note\ndate: '+today()+'\nsensitivity: local\ntags: [cpd, leadership]\n---\n\n# CPD Log\n\nTotal recorded: '+(Math.round(totalH*10)/10)+' hours.\n\n| Date | Course | Provider | Hours | Category | Status |\n|------|--------|----------|-------|----------|--------|\n';
    state.training.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach(t=>{
      md+='| '+[t.date||'',t.course||'',t.provider||'',(t.hours||''),t.category||'',t.status||''].map(x=>String(x).replace(/\|/g,'/')).join(' | ')+' |\n';
    });
    download('cpd-log.md', md);
  }

  function escapeHtml(s){ return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // ---------- boot ----------
  $('taglist').innerHTML = CONTROLLED_TAGS.map(t=>'<option value="'+t+'">').join('');
  $('foot').textContent = 'Notes save to your account and sync across devices. Export writes an Obsidian-ready .md with the right frontmatter for its destination; drop it in the matching folder. Working notes stay local; only Plannetjies and Concepts are shareable, and only after you have checked them for client detail.';

  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); $('view-'+t.dataset.view).classList.add('active');
  });
  $('dest').addEventListener('change', refreshDestInfo);
  $('saveNote').addEventListener('click', saveNote);
  $('noteFilter').addEventListener('input', renderNotes);
  $('exportAll').addEventListener('click', exportAll);
  $('saveTraining').addEventListener('click', saveTraining);
  $('exportCpd').addEventListener('click', exportCpd);

  sb.auth.onAuthStateChange((_e, sess)=>{ if(!sess) location.replace('./'); });
  $('signout').addEventListener('click', async ()=>{ await sb.auth.signOut(); location.replace('./'); });

  (async function boot(){
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ location.replace('./'); return; }
    $('whoami').textContent = session.user.email;
    try {
      const { data, error } = await sb.from('app_data').select('data').eq('tool', TOOL).maybeSingle();
      if(error) throw error;
      if(data && data.data){ state = Object.assign({ notes:[], training:[] }, data.data); }
      setStatus('saved','good');
    } catch(e){ setStatus('offline - not loaded','bad'); }
    refreshDestInfo(); renderNotes(); renderTraining(); populateTrainingLink();
  })();
})();
</script>

</body>
</html>
